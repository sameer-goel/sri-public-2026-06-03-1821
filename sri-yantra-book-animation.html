<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Sri Yantra Guidebook</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      font-family: 'Cormorant Garamond', Georgia, serif;
    }

    .book {
      width: min(600px, 56.25vh);
      height: min(900px, 95vh);
      background: #0a0a0a;
      border: 2px solid #F8D264;
      border-radius: 4px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 40px 30px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 60px rgba(248, 210, 100, 0.08), inset 0 0 80px rgba(0,0,0,0.5);
    }

    .book::before {
      content: '';
      position: absolute;
      inset: 8px;
      border: 1px solid rgba(248, 210, 100, 0.2);
      border-radius: 2px;
      pointer-events: none;
    }

    .title {
      text-align: center;
      color: #fff;
      z-index: 10;
    }
    .title h1 {
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      line-height: 1.1;
    }
    .title h2 {
      font-size: 2.2rem;
      font-weight: 300;
      opacity: 0.8;
      margin-top: 0.1em;
    }

    .yantra-stage {
      position: relative;
      width: min(420px, 70%);
      aspect-ratio: 1;
      flex-shrink: 1;
    }

    svg {
      width: 100%;
      height: 100%;
    }

    .triangle {
      fill: none;
      stroke: #F8D264;
      stroke-width: 0.8;
      stroke-linejoin: miter;
      opacity: 0;
      filter: url(#glow);
    }

    .triangle.visible {
      opacity: 1;
    }

    .triangle.emerging {
      animation: emerge 1.2s ease-out forwards;
    }

    .circle-main {
      fill: none;
      stroke: #F8D264;
      stroke-width: 1;
      opacity: 0;
    }

    .circle-main.visible {
      opacity: 1;
    }

    .circle-main.emerging {
      animation: circleExpand 1s ease-out forwards;
    }

    .bindu {
      fill: #F8D264;
      stroke: none;
      opacity: 0;
    }

    .bindu.visible {
      opacity: 1;
    }

    .bindu.emerging {
      animation: binduPulse 2s ease-out forwards;
    }

    @keyframes emerge {
      0% {
        opacity: 0;
        stroke: #fff;
        stroke-width: 2.5;
        filter: url(#glowStrong);
      }
      20% {
        opacity: 1;
        stroke: #fff;
        stroke-width: 2;
      }
      60% {
        stroke: #F8D264;
        stroke-width: 1.2;
      }
      100% {
        opacity: 1;
        stroke: #F8D264;
        stroke-width: 0.8;
        filter: url(#glow);
      }
    }

    @keyframes circleExpand {
      0% {
        opacity: 0;
        stroke-width: 3;
        stroke: #fff;
      }
      30% {
        opacity: 1;
        stroke: #F8D264;
      }
      100% {
        opacity: 1;
        stroke-width: 1;
        stroke: #F8D264;
      }
    }

    @keyframes binduPulse {
      0% {
        opacity: 0;
        r: 0;
      }
      30% {
        opacity: 1;
        r: 6;
        fill: #fff;
      }
      60% {
        r: 3;
        fill: #F8D264;
      }
      80% {
        r: 4;
      }
      100% {
        opacity: 1;
        r: 2.5;
        fill: #F8D264;
      }
    }

    /* Lightning bolt effect */
    .lightning {
      position: absolute;
      width: 100%;
      height: 100%;
      pointer-events: none;
      opacity: 0;
    }

    .lightning.flash {
      animation: lightningFlash 0.3s ease-out;
    }

    @keyframes lightningFlash {
      0% { opacity: 0.8; }
      50% { opacity: 0.4; }
      100% { opacity: 0; }
    }

    .energy-ring {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 2px solid rgba(248, 210, 100, 0.8);
      opacity: 0;
      pointer-events: none;
    }

    .energy-ring.pulse {
      animation: energyPulse 0.8s ease-out forwards;
    }

    @keyframes energyPulse {
      0% {
        width: 10px;
        height: 10px;
        opacity: 0.9;
        border-color: #fff;
      }
      100% {
        width: 350px;
        height: 350px;
        opacity: 0;
        border-color: rgba(248, 210, 100, 0);
      }
    }

    .brand {
      font-size: 1.1rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      color: rgba(255,255,255,0.5);
      z-index: 10;
    }

    /* Particle field */
    .particles {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      background: #F8D264;
      border-radius: 50%;
      opacity: 0;
    }

    .particle.active {
      animation: particleDrift 2s ease-out forwards;
    }

    @keyframes particleDrift {
      0% {
        opacity: 0.8;
        transform: translate(0, 0) scale(1);
      }
      100% {
        opacity: 0;
        transform: translate(var(--dx), var(--dy)) scale(0);
      }
    }
  </style>
</head>
<body>
  <div class="book">
    <div class="title">
      <h1>The Sri Yantra</h1>
      <h2>Guidebook</h2>
    </div>

    <div class="yantra-stage">
      <div class="particles" id="particles"></div>
      <div class="lightning" id="lightning"></div>
      <div class="energy-ring" id="energyRing"></div>
      <svg id="yantra" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <filter id="glow">
            <feGaussianBlur stdDeviation="1" result="blur"/>
            <feMerge>
              <feMergeNode in="blur"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
          <filter id="glowStrong">
            <feGaussianBlur stdDeviation="4" result="blur"/>
            <feMerge>
              <feMergeNode in="blur"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
        </defs>
      </svg>
    </div>

    <div class="brand">OmSacredSpace</div>
  </div>

  <script>
    (function() {
      const cx = 200, cy = 200, r = 150;
      const svg = document.getElementById('yantra');
      const svgns = "http://www.w3.org/2000/svg";
      const elements = [];

      function pointOnCircle(angle) {
        const rad = angle * Math.PI / 180;
        return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
      }

      function lineIntersection(p1, p2, p3, p4) {
        const dx1 = p2.x - p1.x, dy1 = p2.y - p1.y;
        const dx2 = p4.x - p3.x, dy2 = p4.y - p3.y;
        const D = dx1 * dy2 - dy1 * dx2;
        if (D === 0) return null;
        const t = ((p3.x - p1.x) * dy2 - (p3.y - p1.y) * dx2) / D;
        return { x: p1.x + t * dx1, y: p1.y + t * dy1 };
      }

      function lineCircleIntersections(p1, p2) {
        const dx = p2.x - p1.x, dy = p2.y - p1.y;
        const A = dx * dx + dy * dy;
        const B = 2 * (dx * (p1.x - cx) + dy * (p1.y - cy));
        const C = (p1.x - cx) ** 2 + (p1.y - cy) ** 2 - r * r;
        const disc = B * B - 4 * A * C;
        if (disc < 0) return [];
        const sq = Math.sqrt(disc);
        const t1 = (-B + sq) / (2 * A);
        const t2 = (-B - sq) / (2 * A);
        const pts = [
          { x: p1.x + t1 * dx, y: p1.y + t1 * dy },
          { x: p1.x + t2 * dx, y: p1.y + t2 * dy }
        ];
        if (pts[0].x > pts[1].x) pts.reverse();
        return pts;
      }

      function reflect(p) { return { x: cx + (cx - p.x), y: p.y }; }

      function pointOnCircleFrom(point, angleDeg) {
        const currentAngle = Math.atan2(point.y - cy, point.x - cx);
        const newAngle = currentAngle + angleDeg * Math.PI / 180;
        return { x: cx + r * Math.cos(newAngle), y: cy + r * Math.sin(newAngle) };
      }

      function swapLine(line) {
        if (line.p1.x > line.p2.x) { const tmp = line.p1; line.p1 = line.p2; line.p2 = tmp; }
        return line;
      }

      function sortTri(tri) {
        const pts = [tri.p1, tri.p2, tri.p3].sort((a, b) => a.x - b.x);
        tri.p1 = pts[0]; tri.p2 = pts[1]; tri.p3 = pts[2];
        return tri;
      }

      function createTriangle(tri) {
        const el = document.createElementNS(svgns, "polygon");
        el.setAttribute("points", `${tri.p1.x},${tri.p1.y} ${tri.p2.x},${tri.p2.y} ${tri.p3.x},${tri.p3.y}`);
        el.setAttribute("class", "triangle");
        svg.appendChild(el);
        elements.push({ el, type: 'triangle' });
        return el;
      }

      function createCircle(radius) {
        const el = document.createElementNS(svgns, "circle");
        el.setAttribute("cx", cx);
        el.setAttribute("cy", cy);
        el.setAttribute("r", radius);
        el.setAttribute("class", "circle-main");
        svg.appendChild(el);
        elements.push({ el, type: 'circle' });
        return el;
      }

      // Build geometry
      const P_top = { x: cx, y: cy - r };
      const P_bottom = { x: cx, y: cy + r };
      const P_left = { x: cx - r, y: cy };
      const P_right = { x: cx + r, y: cy };
      const P1 = pointOnCircle(-30);
      const P2 = pointOnCircle(-150);
      const P3 = pointOnCircle(150);
      const P4 = pointOnCircle(30);

      // D1
      const d1_i1 = lineIntersection(P_bottom, P2, P_left, P_top);
      const d1_i2 = lineIntersection(P_bottom, P1, P_right, P_top);
      const d1_circle = lineCircleIntersections(d1_i1, d1_i2);
      const d1_base = { p1: d1_circle[0], p2: d1_circle[1] };
      const d1 = { p1: d1_base.p1, p2: P_bottom, p3: d1_base.p2 };
      const d1_leftline = { p1: d1_base.p1, p2: P_bottom };
      const d1_rightline = { p1: d1_base.p2, p2: P_bottom };
      createTriangle(d1);

      // U1
      const u1_markertip = { x: cx, y: d1_circle[0].y };
      const u1_basemarker1 = lineIntersection(P3, u1_markertip, d1_leftline.p1, d1_leftline.p2);
      const u1_basemarker2 = lineIntersection(P4, u1_markertip, d1_rightline.p1, d1_rightline.p2);
      const u1_baseCircle = lineCircleIntersections(u1_basemarker1, u1_basemarker2);
      const u1_base = { p1: u1_baseCircle[0], p2: u1_baseCircle[1] };
      const u1_tip = P_top;
      const u1_leftline = { p1: u1_base.p1, p2: u1_tip };
      const u1_rightline = { p1: u1_base.p2, p2: u1_tip };
      const u1 = sortTri({ p1: u1_base.p1, p2: u1_tip, p3: u1_base.p2 });
      createTriangle(u1);

      // U2 + D2 setup
      const d3_leftmarker = pointOnCircleFrom(u1.p1, 60);
      const u2_tip = { x: cx, y: d3_leftmarker.y };
      const d3_rightmarker = pointOnCircleFrom(u1.p3, -60);
      const d1LeftU1Base = lineIntersection(d1_leftline.p1, d1_leftline.p2, u1_base.p1, u1_base.p2);
      const d3_basemarkerline = { p1: d3_leftmarker, p2: d3_rightmarker };
      const u2_leftline = { p1: d1LeftU1Base, p2: u2_tip };
      const u2_rightline = { p1: reflect(d1LeftU1Base), p2: u2_tip };

      const u3_leftmarker = pointOnCircleFrom(d1.p1, -60);
      const d2_tip = { x: cx, y: u3_leftmarker.y };
      const u3_rightmarker = pointOnCircleFrom(d1.p3, 60);
      const u1LeftD1Base = lineIntersection(u1_leftline.p1, u1_leftline.p2, d1_base.p1, d1_base.p2);
      const u3_basemarkerline = { p1: u3_leftmarker, p2: u3_rightmarker };
      const d2_leftline = { p1: u1LeftD1Base, p2: d2_tip };
      const d2_rightline = { p1: reflect(u1LeftD1Base), p2: d2_tip };

      // U3
      const U3_tip = { x: cx, y: d1_base.p1.y };
      const U3_leftmarker = lineIntersection(d2_leftline.p1, d2_leftline.p2, u1_base.p1, u1_base.p2);
      const U3_leftline = swapLine({ p1: U3_leftmarker, p2: U3_tip });
      const U3_rightline = swapLine({ p1: reflect(U3_leftmarker), p2: U3_tip });
      const u3_left = lineIntersection(U3_leftline.p1, U3_leftline.p2, u3_basemarkerline.p1, u3_basemarkerline.p2);
      const u3_right = reflect(u3_left);
      const u3 = sortTri({ p1: u3_left, p2: U3_tip, p3: u3_right });
      createTriangle(u3);

      // U2
      const u2_base_m1 = lineIntersection(d1_leftline.p1, d1_leftline.p2, U3_leftline.p1, U3_leftline.p2);
      const u2_base_m2 = lineIntersection(d1_rightline.p1, d1_rightline.p2, U3_rightline.p1, U3_rightline.p2);
      const u2_base_markerline = { p1: u2_base_m1, p2: u2_base_m2 };
      const u2_base_p1 = lineIntersection(u2_leftline.p1, u2_leftline.p2, u2_base_markerline.p1, u2_base_markerline.p2);
      const u2_base_p2 = lineIntersection(u2_rightline.p1, u2_rightline.p2, u2_base_markerline.p1, u2_base_markerline.p2);
      const u2_baseline = swapLine({ p1: u2_base_p1, p2: u2_base_p2 });
      const u2 = sortTri({ p1: u2_baseline.p1, p2: u2_tip, p3: u2_baseline.p2 });
      createTriangle(u2);

      // D3
      const u2LeftD1Base = lineIntersection(u2_leftline.p1, u2_leftline.p2, d1_base.p1, d1_base.p2);
      const u2RightU1Base = lineIntersection(u2_rightline.p1, u2_rightline.p2, u1_base.p1, u1_base.p2);
      const centerDownSlope = { p1: u2LeftD1Base, p2: u2RightU1Base };
      const u2LeftU1Base = lineIntersection(u2_leftline.p1, u2_leftline.p2, u1_base.p1, u1_base.p2);
      const u2RightD1Base = lineIntersection(u2_rightline.p1, u2_rightline.p2, d1_base.p1, d1_base.p2);
      const centerUpSlope = { p1: u2LeftU1Base, p2: u2RightD1Base };

      const U4_base_p1 = lineIntersection(d2_rightline.p1, d2_rightline.p2, centerDownSlope.p1, centerDownSlope.p2);
      const U4_base_p2 = lineIntersection(d2_leftline.p1, d2_leftline.p2, centerUpSlope.p1, centerUpSlope.p2);
      const U4_base_line = swapLine({ p1: U4_base_p1, p2: U4_base_p2 });

      const D3_tip = { x: cx, y: U4_base_line.p1.y };
      const D3_leftline = { p1: centerDownSlope.p1, p2: D3_tip };
      const D3_rightline = { p1: centerUpSlope.p2, p2: D3_tip };
      const D3_p1 = lineIntersection(D3_leftline.p1, D3_leftline.p2, d3_basemarkerline.p1, d3_basemarkerline.p2);
      const D3_p3 = lineIntersection(D3_rightline.p1, D3_rightline.p2, d3_basemarkerline.p1, d3_basemarkerline.p2);
      const D3 = sortTri({ p1: D3_p1, p2: D3_tip, p3: D3_p3 });
      createTriangle(D3);

      // D2
      const D2_base_p1 = lineIntersection(u1_leftline.p1, u1_leftline.p2, D3_leftline.p1, D3_leftline.p2);
      const D2_base_p2 = lineIntersection(u1_rightline.p1, u1_rightline.p2, D3_rightline.p1, D3_rightline.p2);
      const D2_base_line = swapLine({ p1: D2_base_p1, p2: D2_base_p2 });
      const D2_p1 = lineIntersection(d2_leftline.p1, d2_leftline.p2, D2_base_line.p1, D2_base_line.p2);
      const D2_p3 = lineIntersection(d2_rightline.p1, d2_rightline.p2, D2_base_line.p1, D2_base_line.p2);
      const D2 = sortTri({ p1: D2_p1, p2: d2_tip, p3: D2_p3 });
      createTriangle(D2);

      // U4
      const U4_tip = { x: cx, y: D2_base_line.p1.y };
      const U4 = sortTri({ p1: U4_base_line.p1, p2: U4_tip, p3: reflect(U4_base_line.p1) });
      createTriangle(U4);

      // D4
      const D4_base_p1 = lineIntersection(D3_leftline.p1, D3_leftline.p2, U4.p1, U4.p2);
      const D4_base_p2 = lineIntersection(D3_rightline.p1, D3_rightline.p2, U4.p2, U4.p3);
      const D4_base_line = swapLine({ p1: D4_base_p1, p2: D4_base_p2 });
      const D4_p1 = lineIntersection(u2_leftline.p1, u2_leftline.p2, D4_base_line.p1, D4_base_line.p2);
      const D4_p3 = lineIntersection(u2_rightline.p1, u2_rightline.p2, D4_base_line.p1, D4_base_line.p2);
      const D4_tip = { x: cx, y: u2_baseline.p1.y };
      const D4 = sortTri({ p1: D4_p1, p2: D4_tip, p3: D4_p3 });
      createTriangle(D4);

      // D5
      const u3_leftline_comp = { p1: u3.p1, p2: u3.p2 };
      const u3_rightline_comp = { p1: u3.p2, p2: u3.p3 };
      const D5_base_p1 = lineIntersection(D3_leftline.p1, D3_leftline.p2, u3_leftline_comp.p1, u3_leftline_comp.p2);
      const D5_base_p2 = lineIntersection(D3_rightline.p1, D3_rightline.p2, u3_rightline_comp.p1, u3_rightline_comp.p2);
      const D5_base_line = swapLine({ p1: D5_base_p1, p2: D5_base_p2 });
      const U4_leftline = { p1: U4.p1, p2: U4.p2 };
      const U4_rightline = { p1: U4.p2, p2: U4.p3 };
      const D5_p1 = lineIntersection(U4_leftline.p1, U4_leftline.p2, D5_base_line.p1, D5_base_line.p2);
      const D5_p3 = lineIntersection(U4_rightline.p1, U4_rightline.p2, D5_base_line.p1, D5_base_line.p2);
      const D5_tip = { x: cx, y: u1_base.p1.y };
      const D5 = sortTri({ p1: D5_p1, p2: D5_tip, p3: D5_p3 });
      createTriangle(D5);

      // Circles
      createCircle(r);
      createCircle(r + 4);
      createCircle(r + 8);

      // Bindu
      const bindu = document.createElementNS(svgns, "circle");
      bindu.setAttribute("cx", cx);
      bindu.setAttribute("cy", cy);
      bindu.setAttribute("r", 2.5);
      bindu.setAttribute("class", "bindu");
      svg.appendChild(bindu);
      elements.push({ el: bindu, type: 'bindu' });

      // Animation orchestration
      const lightning = document.getElementById('lightning');
      const energyRing = document.getElementById('energyRing');
      const particlesContainer = document.getElementById('particles');

      function flash() {
        lightning.classList.remove('flash');
        void lightning.offsetWidth;
        lightning.classList.add('flash');
      }

      function pulseEnergy() {
        const ring = document.getElementById('energyRing');
        const clone = ring.cloneNode();
        clone.classList.add('pulse');
        ring.parentNode.appendChild(clone);
        setTimeout(() => clone.remove(), 800);
      }

      function spawnParticles(count) {
        for (let i = 0; i < count; i++) {
          const p = document.createElement('div');
          p.className = 'particle';
          const angle = Math.random() * Math.PI * 2;
          const dist = 40 + Math.random() * 120;
          p.style.left = '50%';
          p.style.top = '50%';
          p.style.setProperty('--dx', `${Math.cos(angle) * dist}px`);
          p.style.setProperty('--dy', `${Math.sin(angle) * dist}px`);
          particlesContainer.appendChild(p);
          setTimeout(() => p.classList.add('active'), Math.random() * 200);
          setTimeout(() => p.remove(), 2200);
        }
      }

      // Sequence: bindu first, then triangles from inner to outer, then circles
      const sequence = [
        { idx: 12, delay: 500 },    // bindu (center awakens)
        { idx: 8, delay: 1200 },    // D5 (innermost down)
        { idx: 7, delay: 1800 },    // D4
        { idx: 6, delay: 2400 },    // U4
        { idx: 5, delay: 3000 },    // D2
        { idx: 4, delay: 3600 },    // D3
        { idx: 3, delay: 4200 },    // U2
        { idx: 2, delay: 4800 },    // U3
        { idx: 1, delay: 5400 },    // U1
        { idx: 0, delay: 6000 },    // D1 (outermost)
        { idx: 9, delay: 7000 },    // circle 1
        { idx: 10, delay: 7300 },   // circle 2
        { idx: 11, delay: 7600 },   // circle 3
      ];

      sequence.forEach(({ idx, delay }) => {
        setTimeout(() => {
          const item = elements[idx];
          item.el.classList.add('emerging', 'visible');
          if (item.type === 'triangle') {
            flash();
            spawnParticles(8);
          }
          if (item.type === 'bindu') {
            pulseEnergy();
            spawnParticles(20);
          }
          if (item.type === 'circle') {
            pulseEnergy();
          }
        }, delay);
      });

      // Final pulse when complete
      setTimeout(() => {
        pulseEnergy();
        spawnParticles(30);
        flash();
      }, 8200);

    })();
  </script>
</body>
</html>
