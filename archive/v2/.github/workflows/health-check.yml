name: Site Health Check

on:
  schedule:
    - cron: '23 8 * * 1,4'  # Monday + Thursday 8:23 UTC
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check omsacredspace.com
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 https://omsacredspace.com/)
          CERT_EXPIRY=$(echo | openssl s_client -servername omsacredspace.com -connect omsacredspace.com:443 2>/dev/null | openssl x509 -noout -enddate 2>/dev/null | cut -d= -f2)
          DAYS_LEFT=$(( ($(date -d "$CERT_EXPIRY" +%s) - $(date +%s)) / 86400 ))

          echo "HTTP Status: $STATUS"
          echo "Cert expires: $CERT_EXPIRY"
          echo "Days until expiry: $DAYS_LEFT"

          if [ "$STATUS" != "200" ]; then
            echo "::error::Site returned HTTP $STATUS"
            exit 1
          fi

          if [ "$DAYS_LEFT" -lt 14 ]; then
            echo "::warning::SSL certificate expires in $DAYS_LEFT days"
            exit 1
          fi

          echo "All checks passed"

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🔴 Site health check failed',
              body: `Automated health check failed at ${new Date().toISOString()}.\n\nCheck the [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.\n\nPossible issues:\n- Site returning non-200 status\n- SSL certificate expiring within 14 days`,
              labels: ['bug', 'automated']
            });
